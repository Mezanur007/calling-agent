services:
  - type: web
    name: calling-agent-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: OPENAI_REALTIME_VOICE
        value: shimmer
      - key: CORS_ORIGINS
        sync: false
